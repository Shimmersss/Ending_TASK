spring.application.name=SOFT-rear
spring.profiles.default=local
# ===================================================================
# =                         DATA SOURCE
# ===================================================================
# ???????
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?????URL
# ?? `your_database_name` ??????????
# `serverTimezone=UTC` ???????????????
spring.datasource.url=jdbc:mysql://localhost:3306/VUE?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8

# ??????
spring.datasource.username=${DB_USERNAME:root}

# ?????
# ??? application-local.properties ?????? DB_PASSWORD ????
spring.datasource.password=${DB_PASSWORD:changeme}

# ===================================================================
# =                           JPA / HIBERNATE
# ===================================================================
# ?????????Hibernate????MySQL?SQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ?????????SQL???????
spring.jpa.show-sql=true

# ??????SQL
spring.jpa.properties.hibernate.format_sql=true

# Hibernate?DDL??????????
# create: ?????????????
# create-drop: ???????????
# update: ?????????????????????????
# validate: ????????????????
# none: ??????
spring.jpa.hibernate.ddl-auto=update

# multipart upload limits for point cloud files
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# ===================================================================
# =                         EXTERNAL SERVICES
# ===================================================================
detection.yolo-base-url=${YOLO_BASE_URL:http://127.0.0.1:9000}
detection.mmdet3d-base-url=${MMDET3D_BASE_URL:http://127.0.0.1:8000}
detection.kitti-dataset-root=${KITTI_DATASET_ROOT:}

# Dify local Docker usually exposes the service API under http://localhost/v1.
# Put real values in application-local.properties or environment variables.
dify.enabled=${DIFY_ENABLED:true}
dify.base-url=${DIFY_BASE_URL:http://localhost/v1}
dify.api-key=${DIFY_API_KEY:}
dify.workflow-id=${DIFY_WORKFLOW_ID:}
dify.workflow-user-prefix=${DIFY_WORKFLOW_USER_PREFIX:drone-demo}
