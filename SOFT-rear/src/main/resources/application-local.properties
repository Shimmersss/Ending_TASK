# Local-only overrides. Never commit real secrets.
# Activate with: --spring.profiles.active=local

spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.username=${DB_USERNAME:root}

dify.enabled=true
dify.base-url=http://localhost/v1
dify.api-key=${DIFY_API_KEY:}
dify.workflow-id=${DIFY_WORKFLOW_ID:}
dify.workflow-user-prefix=${DIFY_WORKFLOW_USER_PREFIX:drone-demo}

spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

detection.kitti-dataset-root=${KITTI_DATASET_ROOT:F:/YOLO/kitty}
